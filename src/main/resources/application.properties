spring.application.name=smart-reservation-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
server.port=${PORT:8081}

# Default datasource values point to local Supabase; cloud overrides come from environment variables.
spring.datasource.url=${JDBC_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

springdoc.swagger-ui.path=/swagger-ui.html
